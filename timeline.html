<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Technology Timeline — BuildSmart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #0f1a2e 0%, #1a2e1a 100%);
    min-height: 100vh; padding: 2rem 1rem; color: #e2e8f0;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.5rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: white; margin-bottom: 0.5rem; }
  .subtitle { font-size: 0.9rem; color: #94a3b8; font-weight: 300; line-height: 1.6; }

  /* Filter tabs */
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
  .filter-btn {
    padding: 0.4rem 1rem; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04); font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; color: #94a3b8; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #3b82f6; color: #93c5fd; }
  .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }

  /* Timeline */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before {
    content: ''; position: absolute; left: 6px; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(180deg, #3b82f6, #10b981, #8b5cf6, #f59e0b);
    border-radius: 1px;
  }

  .tl-item {
    position: relative; margin-bottom: 1.25rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .tl-dot {
    position: absolute; left: -28px; top: 14px;
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid currentColor; background: #0f1a2e;
    transition: transform 0.15s;
  }

  .tl-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 1.1rem 1.25rem; cursor: pointer;
    transition: all 0.2s; border-left: 3px solid transparent;
  }
  .tl-card:hover { background: rgba(255,255,255,0.08); transform: translateX(3px); }
  .tl-card.expanded { background: rgba(255,255,255,0.08); }

  .tl-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .tl-left { display: flex; align-items: center; gap: 0.75rem; }
  .tl-icon { font-size: 1.3rem; }
  .tl-year { font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500; }
  .tl-name { font-weight: 600; font-size: 0.95rem; color: white; }
  .tl-tag {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 2px 8px;
    border-radius: 12px; white-space: nowrap; flex-shrink: 0;
  }

  .tl-body { display: none; margin-top: 0.85rem; padding-top: 0.85rem; border-top: 1px solid rgba(255,255,255,0.07); }
  .tl-body.open { display: block; }
  .tl-desc { font-size: 0.87rem; color: #cbd5e1; line-height: 1.7; margin-bottom: 0.75rem; }
  .tl-impact { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .tl-pill { font-size: 0.72rem; padding: 2px 10px; border-radius: 12px; background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); }
  .tl-australia { font-size: 0.78rem; color: #60a5fa; margin-top: 0.4rem; }
  .tl-chevron { font-size: 0.75rem; color: #475569; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
  .tl-card.expanded .tl-chevron { transform: rotate(180deg); }

  .era-label {
    font-family: 'DM Mono', monospace; font-size: 0.68rem; color: #475569;
    text-transform: uppercase; letter-spacing: 0.1em; margin: 1.75rem 0 0.75rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .era-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

  .branding { text-align: right; margin-top: 1.5rem; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: #475569; }
  .branding span { color: #3b82f6; }

  .no-results { text-align: center; padding: 2rem; color: #475569; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="eyebrow">Interactive Timeline · BuildSmart</div>
    <h1>Construction Technology Timeline</h1>
    <p class="subtitle">Explore the key innovations that have transformed construction from the 1990s to today — and what's coming next. Click any item to expand its story.</p>
  </div>

  <div class="filters" id="filters"></div>
  <div class="timeline" id="timeline"></div>
  <div class="branding">Powered by <span>BuildSmart</span> · Educational Use Only</div>
</div>

<script>
const events = [
  // 1990s
  { year: 1994, era: 'Digital Foundations (1990s)', icon: '📐', name: 'CAD Goes Mainstream', category: 'Digital', color: '#3b82f6',
    desc: 'Computer-Aided Design (CAD) replaces hand drafting as the industry standard across architecture and engineering firms. AutoCAD dominates the market, dramatically accelerating drawing production and enabling easier revisions.',
    impacts: ['Drafting time', 'Drawing accuracy', 'Reproducibility'],
    aus: '🇦🇺 Australian firms rapidly adopt AutoCAD through the mid-1990s, with TAFE and universities updating curricula.'
  },
  { year: 1997, era: 'Digital Foundations (1990s)', icon: '🔗', name: 'Early BIM Concepts Emerge', category: 'BIM',  color: '#10b981',
    desc: 'Autodesk, Graphisoft, and Bentley begin developing object-based modelling tools that embed building data into geometric elements — the conceptual foundation of what would become BIM. Graphisoft\'s ArchiCAD (released 1987) begins gaining traction as the first true BIM authoring tool.',
    impacts: ['Data-rich models', 'Parametric design', 'Object intelligence'],
    aus: '🇦🇺 Early BIM adopters in Australia are primarily large architectural practices experimenting with Graphisoft ArchiCAD.'
  },
  // 2000s
  { year: 2002, era: 'BIM Emerges (2000s)', icon: '🏗️', name: 'Autodesk Acquires Revit', category: 'BIM', color: '#10b981',
    desc: 'Autodesk acquires Revit Technology Corporation for $133 million, signalling its commitment to BIM-based design tools. Revit\'s parametric change propagation and integrated model approach rapidly gains industry acceptance, particularly in the USA.',
    impacts: ['Parametric modelling', 'Clash detection', 'Design coordination'],
    aus: '🇦🇺 Revit begins appearing in larger Australian architectural and engineering firms by the mid-2000s.'
  },
  { year: 2006, era: 'BIM Emerges (2000s)', icon: '📡', name: 'IoT Sensors Enter Construction', category: 'IoT', color: '#f59e0b',
    desc: 'Early Internet of Things technologies begin appearing on large construction sites — primarily structural health monitoring sensors on bridges and tunnels. Wireless data transmission enables remote monitoring without costly cabling.',
    impacts: ['Structural monitoring', 'Remote data', 'Safety alerts'],
    aus: '🇦🇺 Early IoT monitoring deployed on major Australian infrastructure projects including the Sydney Desalination Plant.'
  },
  { year: 2008, era: 'BIM Emerges (2000s)', icon: '🚁', name: 'Commercial Drones Begin Site Use', category: 'Drones', color: '#8b5cf6',
    desc: 'Early commercial drones (UAVs) begin appearing on construction sites for aerial photography and basic progress monitoring. GPS accuracy and payload capacity are still limited, but the potential for site surveying is immediately apparent.',
    impacts: ['Aerial survey', 'Progress photos', 'Site accessibility'],
    aus: '🇦🇺 CASA regulatory frameworks for commercial drone use in construction begin developing from 2009.'
  },
  // 2010s
  { year: 2011, era: 'Smart Construction Accelerates (2010s)', icon: '🌐', name: 'UK Government BIM Mandate Announced', category: 'BIM', color: '#10b981',
    desc: 'The UK Government announces a mandate requiring Level 2 BIM on all public sector construction projects by 2016 — a watershed moment for global BIM adoption. The mandate accelerates software development, standards creation, and skills training across the industry.',
    impacts: ['Policy-driven adoption', 'BIM Level 2 standard', 'Global influence'],
    aus: '🇦🇺 Australian governments begin developing their own BIM frameworks, with NSW leading the way for public projects.'
  },
  { year: 2013, era: 'Smart Construction Accelerates (2010s)', icon: '🤖', name: '3D Printing of Building Components', category: '3D Printing', color: '#ec4899',
    desc: 'Large-format 3D printing of concrete structural components becomes technically feasible. The first 3D-printed building components are installed in real projects in China and Europe. The technology promises dramatic reductions in formwork waste and labour costs for complex geometry.',
    impacts: ['Complex geometry', 'Waste reduction', 'Labour savings'],
    aus: '🇦🇺 CSIRO begins research into concrete 3D printing for Australian housing applications.'
  },
  { year: 2015, era: 'Smart Construction Accelerates (2010s)', icon: '🔮', name: 'Digital Twins Concept Formalised', category: 'Digital Twin', color: '#06b6d4',
    desc: 'The concept of a "digital twin" — a live, data-synchronised virtual replica of a physical asset — becomes formally recognised across infrastructure and construction sectors. NASA\'s earlier simulation work is adapted for built assets, supported by increasing IoT sensor density.',
    impacts: ['Real-time monitoring', 'Predictive maintenance', 'Lifecycle management'],
    aus: '🇦🇺 Infrastructure Australia begins piloting digital twin concepts on major transport corridors.'
  },
  { year: 2017, era: 'Smart Construction Accelerates (2010s)', icon: '🥽', name: 'AR/VR Enters Construction Workflows', category: 'AR/VR', color: '#8b5cf6',
    desc: 'Augmented Reality headsets (Microsoft HoloLens, first generation) and VR platforms reach sufficient maturity for practical construction use. BIM model overlay on physical sites becomes commercially viable, enabling precise positioning, quality checking, and immersive client walkthroughs.',
    impacts: ['BIM overlay', 'Quality checking', 'Client engagement'],
    aus: '🇦🇺 Major Australian contractors (Lendlease, CIMIC) begin deploying AR/VR on signature projects.'
  },
  { year: 2018, era: 'Smart Construction Accelerates (2010s)', icon: '🛸', name: 'LiDAR Drones Revolutionise Surveying', category: 'Drones', color: '#8b5cf6',
    desc: 'LiDAR-equipped drones enable millimetre-accurate 3D point cloud mapping of entire construction sites within hours. Combined with photogrammetry, this replaces traditional surveying on many projects, dramatically reducing time and improving safety by removing surveyors from hazardous areas.',
    impacts: ['mm accuracy', 'Rapid survey', 'Safety improvement'],
    aus: '🇦🇺 Australian surveying firms rapidly adopt LiDAR drone platforms; CASA finalises Part 101 regulations.'
  },
  // 2020s
  { year: 2020, era: 'AI & Integration (2020s)', icon: '🧠', name: 'AI-Powered Design Tools Emerge', category: 'AI', color: '#f97316',
    desc: 'Generative design tools powered by machine learning begin entering mainstream architectural practice. Platforms such as Autodesk Forma and Spacemaker (acquired by Autodesk) use AI to generate and evaluate thousands of design options against performance criteria — sun, wind, density, cost — in minutes.',
    impacts: ['Design optimisation', 'Performance simulation', 'Rapid iteration'],
    aus: '🇦🇺 Leading Australian practices begin using generative design tools for masterplanning and residential typology studies.'
  },
  { year: 2021, era: 'AI & Integration (2020s)', icon: '🤖', name: 'Construction Robots Go Commercial', category: 'Robotics', color: '#ec4899',
    desc: 'Commercially available construction robots enter the mainstream: Hilti Jaibot for ceiling drilling, Boston Dynamics Spot for site inspection, and Fastbrick Robotics\' Hadrian X for automated bricklaying. These platforms move from research labs to active construction sites.',
    impacts: ['Labour augmentation', 'Safety', 'Consistency'],
    aus: '🇦🇺 Hadrian X, developed in Perth by FBR Ltd, completes commercial bricklaying projects in Western Australia.'
  },
  { year: 2022, era: 'AI & Integration (2020s)', icon: '🌍', name: 'National Digital Twin Framework (Australia)', category: 'Digital Twin', color: '#06b6d4',
    desc: 'The Australian Government formalises its National Digital Twin (NDT) Programme, coordinated by CSIRO, to create a federated national digital twin of Australia\'s built environment. The NDT connects data from infrastructure, buildings, and land to enable whole-of-economy simulation and planning.',
    impacts: ['National coordination', 'Open data', 'Policy simulation'],
    aus: '🇦🇺 CSIRO leads the NDT programme with initial applications in flood risk, urban heat, and transport modelling.'
  },
  { year: 2024, era: 'AI & Integration (2020s)', icon: '✨', name: 'AI Construction Project Management', category: 'AI', color: '#f97316',
    desc: 'AI platforms such as Alice Technologies and Buildots use computer vision and machine learning to automate schedule optimisation and real-time progress tracking. Cameras installed throughout sites capture daily progress, which AI compares against the BIM model to flag deviations and predict delays.',
    impacts: ['Schedule optimisation', 'Progress tracking', 'Risk prediction'],
    aus: '🇦🇺 Major Australian tier-1 contractors trial AI progress monitoring on large hospital and infrastructure projects.'
  },
  // Future
  { year: 2026, era: 'Emerging Horizon (2026–2035)', icon: '🔭', name: 'Autonomous Construction Vehicles', category: 'Robotics', color: '#ec4899',
    desc: 'Fully autonomous earthmoving equipment, guided by GNSS, LiDAR, and on-board AI, begins wide commercial deployment on large civil projects. Komatsu, Caterpillar, and Volvo all have active autonomous fleet programmes reducing operator exposure to hazardous site conditions.',
    impacts: ['24/7 operation', 'Safety', 'Precision grading'],
    aus: '🇦🇺 Projected Australian deployment in mining-to-construction technology transfer pathways.'
  },
  { year: 2030, era: 'Emerging Horizon (2026–2035)', icon: '🏙️', name: 'Integrated Smart City Digital Twins', category: 'Digital Twin', color: '#06b6d4',
    desc: 'City-scale digital twins — integrating building, infrastructure, transport, energy grid, and environmental data — become operational tools for urban planners and emergency managers. Real-time simulation enables proactive management of extreme weather events, population growth, and energy demand.',
    impacts: ['City planning', 'Emergency management', 'Net zero tracking'],
    aus: '🇦🇺 Sydney, Melbourne, and Brisbane are among cities targeted for full digital twin integration by 2030.'
  },
  { year: 2035, era: 'Emerging Horizon (2026–2035)', icon: '🪐', name: 'Self-Healing & Responsive Materials', category: 'Materials', color: '#14b8a6',
    desc: 'Smart building materials — including self-healing concrete (using bacteria or microcapsules), thermochromic glass, and phase-change insulation — become cost-competitive. Buildings respond autonomously to environmental conditions, extending service life and eliminating many maintenance cycles.',
    impacts: ['Longevity', 'Reduced maintenance', 'Adaptive performance'],
    aus: '🇦🇺 CSIRO and University of Melbourne lead research programmes on self-healing concrete for Australian conditions.'
  },
];

const categories = ['All', ...new Set(events.map(e => e.category))];
let activeFilter = 'All';
let expandedId = null;

function buildFilters() {
  const cont = document.getElementById('filters');
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
      buildTimeline();
    };
    cont.appendChild(btn);
  });
}

function buildTimeline() {
  const cont = document.getElementById('timeline');
  cont.innerHTML = '';
  const filtered = activeFilter === 'All' ? events : events.filter(e => e.category === activeFilter);
  if (filtered.length === 0) { cont.innerHTML = '<div class="no-results">No events match this filter.</div>'; return; }

  let currentEra = null;
  filtered.forEach((ev, idx) => {
    if (ev.era !== currentEra) {
      currentEra = ev.era;
      const era = document.createElement('div');
      era.className = 'era-label';
      era.textContent = ev.era;
      cont.appendChild(era);
    }

    const item = document.createElement('div');
    item.className = 'tl-item';
    item.innerHTML = `
      <div class="tl-dot" style="color:${ev.color}; border-color:${ev.color};"></div>
      <div class="tl-card" id="card-${idx}" onclick="toggleItem(${idx})" style="border-left-color:${ev.color}">
        <div class="tl-top">
          <div class="tl-left">
            <span class="tl-icon">${ev.icon}</span>
            <div>
              <div class="tl-year" style="color:${ev.color}">${ev.year}${ev.year >= 2025 ? ' (projected)' : ''}</div>
              <div class="tl-name">${ev.name}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span class="tl-tag" style="background:${ev.color}22; color:${ev.color}; border:1px solid ${ev.color}44;">${ev.category}</span>
            <span class="tl-chevron">▼</span>
          </div>
        </div>
        <div class="tl-body" id="body-${idx}">
          <div class="tl-desc">${ev.desc}</div>
          <div class="tl-impact">${ev.impacts.map(i => `<span class="tl-pill">${i}</span>`).join('')}</div>
          <div class="tl-australia">${ev.aus}</div>
        </div>
      </div>
    `;
    cont.appendChild(item);
  });
}

function toggleItem(idx) {
  const card = document.getElementById('card-' + idx);
  const body = document.getElementById('body-' + idx);
  const isOpen = body.classList.contains('open');
  // Close all
  document.querySelectorAll('.tl-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.tl-card').forEach(c => c.classList.remove('expanded'));
  if (!isOpen) { body.classList.add('open'); card.classList.add('expanded'); }
}

buildFilters();
buildTimeline();
</script>
</body>
</html>
